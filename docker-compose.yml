version: '3.8'

services:
  grobid:
    image: grobid/grobid:0.9.0-full
    container_name: grobid  # 可选，固定容器名称
    restart: unless-stopped  # 可选，自动重启策略
    ports:
      - "8070:8070"
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    init: true
    ulimits:
      core: 0

# docker run --rm --gpus all --init --ulimit core=0 -p 8070:8070 grobid/grobid:0.9.0-full
